[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "--tb=short",
    "--strict-markers",
    "-q",
]
markers = [
    "slow: marks tests that take >1s (deselect with '-m \"not slow\"')",
]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# E402: importorskip must come before the guarded import
"tests/test_hybrid_predictor.py" = ["E402"]
"tests/test_keyboard_bridge.py" = ["E402"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["src.platform.windows", "src.platform.linux", "src.keyboard_app"]
ignore_errors = true

# Optional transitive deps that may be installed locally (e.g. via the
# commented-out transformers extra in requirements.txt) but never on
# CI.  `follow_imports = "skip"` bypasses parsing of these libraries so
# their py3.10-syntax features (huggingface_hub uses `match`) don't
# crash mypy when our project targets py3.9.  CI behaviour is
# unchanged — these modules aren't installed there, so the override is
# a no-op.
[[tool.mypy.overrides]]
module = ["huggingface_hub.*", "transformers.*", "torch.*"]
follow_imports = "skip"
