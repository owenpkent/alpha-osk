[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = [
    "--tb=short",
    "--strict-markers",
    "-q",
]
markers = [
    "slow: marks tests that take >1s (deselect with '-m \"not slow\"')",
]

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.per-file-ignores]
# E402: importorskip must come before the guarded import
"tests/test_hybrid_predictor.py" = ["E402"]
"tests/test_keyboard_bridge.py" = ["E402"]

[tool.mypy]
python_version = "3.9"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["src.platform.windows", "src.platform.linux", "src.keyboard_app"]
ignore_errors = true
