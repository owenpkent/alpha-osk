name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
      - run: pip install mypy PySide6
      - run: mypy src/ --ignore-missing-imports

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=60

  # Reads the committed lockfiles (requirements-dev.txt for Python,
  # backend/cf-worker/package-lock.json for the worker) and queries
  # the OSV database for known CVEs.  Pinned to the v2.3.8 SHA per
  # the audit-driven hardening posture (tag refs are mutable).
  #
  # fail-on-vuln: true gates merges on unknown CVEs.  The known
  # Wrangler-3.x esbuild/undici findings were resolved by upgrading
  # to Wrangler 4.x; the transitive lxml advisory was resolved by
  # pinning lxml>=6.1.0 in requirements-dev.txt.  If a future CVE
  # appears and we genuinely can't fix it before the next push,
  # quarantine it with an `osv-scanner.toml` ignore entry rather
  # than flipping this back to false globally.
  #
  # upload-sarif: false by default.  Originally because the source repo
  # was private and GitHub Advanced Security (required for SARIF upload
  # to the Security tab on private repos) was not enabled.  The repo
  # went public on 2026-05-16, so code scanning is now free and SARIF
  # upload could be flipped on — kept off for now because findings still
  # surface in the action's job summary / annotations, and surfacing
  # them in the public Security tab also publishes them to anyone
  # watching.  Flip to true once you're comfortable with that.
  osv-scan:
    name: OSV Scanner (deps CVE check)
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      scan-args: |-
        --lockfile=requirements-dev.txt
        --lockfile=backend/cf-worker/package-lock.json
      fail-on-vuln: true
      upload-sarif: false
